<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Lab — Landmark Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; padding: 16px; }
    h1 { font-size: 18px; margin-bottom: 16px; color: #7dd3fc; }
    .layout { display: flex; gap: 16px; flex-wrap: wrap; }
    .panel { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; }
    .panel h2 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    canvas { display: block; border: 1px solid #333; border-radius: 4px; max-width: 100%; }
    button { background: #1d4ed8; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 13px; margin: 4px 2px; }
    button:hover { background: #2563eb; }
    button:disabled { background: #374151; cursor: not-allowed; }
    button.secondary { background: #374151; }
    button.success { background: #065f46; }
    .log { background: #0a0a0a; border: 1px solid #222; border-radius: 4px; padding: 8px; height: 300px; overflow-y: auto; font-size: 11px; line-height: 1.6; }
    .log .info { color: #7dd3fc; }
    .log .ok { color: #34d399; }
    .log .warn { color: #fbbf24; }
    .log .err { color: #f87171; }
    input[type=file] { display: none; }
    label.file-btn { display: inline-block; background: #374151; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; margin: 4px 2px; }
    label.file-btn:hover { background: #4b5563; }
    .side-selector { display: flex; gap: 8px; margin: 8px 0; }
    .side-btn { flex: 1; padding: 6px; border: 2px solid #374151; background: transparent; color: #94a3b8; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .side-btn.active { border-color: #7dd3fc; color: #7dd3fc; }
    .metrics { font-size: 12px; line-height: 2; }
    .metrics .val { color: #34d399; font-weight: bold; }
    .metrics .bad { color: #f87171; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Profile Lab — Landmark Tester</h1>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
